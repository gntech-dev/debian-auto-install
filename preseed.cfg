### ============================================================
### Debian 13 (Trixie) – Fully automated preseed configuration
### ============================================================
###
### USAGE
### -----
### 1. Edit the sections marked "CONFIGURE" below:
###      - Root / admin password hashes
###      - Target disk (default: /dev/sda)
###      - Locale, keyboard and timezone (if different from UTC/en_US)
###
### 2. Host this file and the scripts/ directory at a reachable URL.
###    The simplest option is to push to GitHub and use the raw URL:
###      https://raw.githubusercontent.com/<org>/<repo>/main/preseed.cfg
###
### 3. Set SCRIPTS_URL in config.env (and SSH_KEYS_URL, STATIC_IP, etc.)
###
### 4. Boot the Debian 13 installer with:
###      auto=true priority=critical
###      url=https://raw.githubusercontent.com/<org>/<repo>/main/preseed.cfg
###      SCRIPTS_URL=https://raw.githubusercontent.com/<org>/<repo>/main/scripts
###      SSH_KEYS_URL=https://github.com/<user>.keys
###
### PASSWORD HASH GENERATION
### ------------------------
###   echo "mysecret" | mkpasswd -m sha-512 -s
###   (requires the "whois" package: apt install whois)
###
### DISK LAYOUT (UEFI / GPT)
### ------------------------
###   /dev/sda1  512 MB   EFI System Partition  (vfat)
###   /dev/sda2    1 GB   /boot                 (ext4)
###   /dev/sda3    4 GB   swap
###   /dev/sda4   rest    /                     (btrfs, later split into subvolumes)
###
### Btrfs subvolumes created by scripts/btrfs-subvols.sh:
###   @           /
###   @home       /home
###   @snapshots  /.snapshots
###   @var_log    /var/log

# ===========================================================================
# LOCALE AND KEYBOARD
# ===========================================================================

d-i debian-installer/locale string en_US.UTF-8
d-i localechooser/supported-locales multiselect en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i keyboard-configuration/layoutcode string us

# ===========================================================================
# NETWORK (installer phase – DHCP is used during installation)
# ===========================================================================

d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 60

# CONFIGURE: set the hostname used by the installer; post-install scripts
# apply the hostname from config.env / SSH_KEYS_URL kernel parameter.
d-i netcfg/get_hostname string debian-trixie
d-i netcfg/get_domain string local

# Disable WEP key prompt
d-i netcfg/wireless_wep string

# ===========================================================================
# DEBIAN MIRROR
# ===========================================================================

d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

# ===========================================================================
# CLOCK AND TIMEZONE
# ===========================================================================

d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string pool.ntp.org

# ===========================================================================
# DISK PARTITIONING
# ===========================================================================

# CONFIGURE: change if your disk is not /dev/sda
d-i partman-auto/disk string /dev/sda

# Use "regular" (not LVM or crypto) – Btrfs handles its own subvolumes
d-i partman-auto/method string regular

d-i partman-auto/choose_recipe select btrfs-uefi
d-i partman-auto/expert_recipe string             \
    btrfs-uefi ::                                 \
        538 538 1075 free                         \
            $iflabel{ gpt }                       \
            $reusemethod{ }                       \
            method{ efi }                         \
            format{ }                           . \
        1024 1024 1024 ext4                       \
            $primary{ }                           \
            method{ format }                      \
            format{ }                             \
            use_filesystem{ }                     \
            filesystem{ ext4 }                    \
            mountpoint{ /boot }                 . \
        4096 4096 4096 linux-swap                 \
            method{ swap }                        \
            format{ }                           . \
        20480 40960 -1 btrfs                      \
            method{ format }                      \
            format{ }                             \
            use_filesystem{ }                     \
            filesystem{ btrfs }                   \
            mountpoint{ / }                     .

d-i partman-basicfilesystems/no_swap boolean false
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ===========================================================================
# BASE SYSTEM
# ===========================================================================

d-i base-installer/install-recommends boolean true
d-i base-installer/kernel/image string linux-image-amd64

# ===========================================================================
# APT
# ===========================================================================

d-i apt-setup/use_mirror boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

# ===========================================================================
# PACKAGE SELECTION
# ===========================================================================

tasksel tasksel/first multiselect standard, ssh-server

d-i pkgsel/include string                         \
    btrfs-progs                                   \
    rsync                                         \
    curl                                          \
    wget                                          \
    git                                           \
    vim                                           \
    htop                                          \
    tmux                                          \
    sudo                                          \
    ca-certificates                               \
    apt-transport-https                           \
    gnupg                                         \
    lsb-release                                   \
    openssh-server                                \
    snapper                                       \
    needrestart                                   \
    unattended-upgrades                           \
    ifupdown                                      \
    net-tools                                     \
    iproute2                                      \
    dnsutils                                      \
    whois

d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades
popularity-contest popularity-contest/participate boolean false

# ===========================================================================
# USERS
# ===========================================================================

# CONFIGURE: generate hashes with:
#   echo "mypassword" | mkpasswd -m sha-512 -s
# Then replace the placeholder below with your real hash.

d-i passwd/root-login boolean true

# Placeholder – MUST be replaced before use.
d-i passwd/root-password-crypted password CHANGEME_ROOT_HASH

d-i passwd/make-user boolean true
d-i passwd/user-fullname string Admin User
d-i passwd/username string admin

# Placeholder – MUST be replaced before use.
d-i passwd/user-password-crypted password CHANGEME_ADMIN_HASH

d-i passwd/user-default-groups string sudo cdrom audio video plugdev netdev

# ===========================================================================
# BOOTLOADER
# ===========================================================================

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false

# CONFIGURE: change if your boot disk is not /dev/sda
d-i grub-installer/bootdev string /dev/sda

# ===========================================================================
# LATE COMMAND – downloads and runs post-install scripts from GitHub
# ===========================================================================
#
# The SCRIPTS_URL variable is picked up from the kernel command line when
# passed as a boot parameter; setup.sh falls back to the GitHub URL in
# config.env if it is not set in the environment.
#
# All script output is tee'd to /var/log/post-install.log in the target.

d-i preseed/late_command string \
    SCRIPTS_URL="${SCRIPTS_URL:-https://raw.githubusercontent.com/gntech-dev/debian-auto-install/main/scripts}" ; \
    SSH_KEYS_URL="${SSH_KEYS_URL:-}" ; \
    STATIC_IP="${STATIC_IP:-}" ; \
    NETMASK="${NETMASK:-255.255.255.0}" ; \
    GATEWAY="${GATEWAY:-}" ; \
    DNS_SERVERS="${DNS_SERVERS:-8.8.8.8 8.8.4.4}" ; \
    HOSTNAME="${PRESEED_HOSTNAME:-debian-server}" ; \
    DOMAIN="${DOMAIN:-local}" ; \
    NETWORK_INTERFACE="${NETWORK_INTERFACE:-eth0}" ; \
    TIMEZONE="${TIMEZONE:-UTC}" ; \
    export SCRIPTS_URL SSH_KEYS_URL STATIC_IP NETMASK GATEWAY DNS_SERVERS \
           HOSTNAME DOMAIN NETWORK_INTERFACE TIMEZONE ; \
    wget -q --timeout=60 --tries=3 \
         -O /tmp/setup.sh "${SCRIPTS_URL}/setup.sh" && \
    chmod +x /tmp/setup.sh && \
    bash /tmp/setup.sh

# ===========================================================================
# FINISH
# ===========================================================================

d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true
