### Debian 13 GNTECH automated install

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i time/zone string America/Santo_Domingo

### DHCP during install
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean false
d-i netcfg/get_hostname string G1
d-i netcfg/get_domain string GNTECH.ME
d-i netcfg/get_nameservers string 1.1.1.1 8.8.8.8

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### User
d-i passwd/root-login boolean false
d-i passwd/user-fullname string gntech
d-i passwd/username string gntech
d-i passwd/user-password password gntech
d-i passwd/user-password-again password gntech
d-i user-setup/allow-password-weak boolean true

### Clock
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

### Partitioning
d-i partman-auto/disk string /dev/sda
d-i partman-auto/init_automatically_partition select Guided - use entire disk
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman/default_filesystem string btrfs

d-i partman-partitioning/choose_label select gpt
d-i partman-partitioning/default_label string gpt
d-i partman-partitioning/confirm_write_new_label boolean true

d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true

### APT
d-i apt-setup/use_mirror boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true

### Software
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string sudo curl git openssh-server ifupdown vlan btrfs-progs ca-certificates snapper inotify-tools rsync make gawk
d-i pkgsel/ignore-incomplete-language-support boolean true
d-i pkgsel/install-language-support boolean false
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finish
d-i finish-install/reboot_in_progress note

### Late command - download scripts from GitHub
d-i preseed/late_command string \
in-target apt update || true; \
in-target apt install -y curl ca-certificates || true; \
in-target curl -fsSL https://raw.githubusercontent.com/gntech-dev/debian-auto-install/main/scripts/gntech-finalize.sh -o /root/gntech-finalize.sh; \
in-target curl -fsSL https://raw.githubusercontent.com/gntech-dev/debian-auto-install/main/scripts/gntech-firstboot.sh -o /root/gntech-firstboot.sh; \
in-target chmod +x /root/gntech-finalize.sh /root/gntech-firstboot.sh; \
in-target /root/gntech-finalize.sh || true